# Font (ported from Alacritty)
font_family      Hack Nerd Font Regular
bold_font        Hack Nerd Font Bold
italic_font      Hack Nerd Font Italic
font_size        12.0

# Option as Alt (ported from Alacritty)
macos_option_as_alt yes

# Bell (ported from Alacritty - silent bell)
enable_audio_bell no

# Clipboard / OSC 52
clipboard_control write-clipboard read-clipboard

# Colors (Alacritty defaults, ported from source)
foreground #d8d8d8
background #181818

# Normal colors
color0  #181818
color1  #ac4242
color2  #90a959
color3  #f4bf75
color4  #6a9fb5
color5  #aa759f
color6  #75b5aa
color7  #d8d8d8

# Bright colors
color8  #6b6b6b
color9  #c55555
color10 #aac474
color11 #feca88
color12 #82b8c8
color13 #c28cb8
color14 #93d3c3
color15 #f8f8f8

# Hide process name from macOS menu bar
macos_show_window_title_in window
